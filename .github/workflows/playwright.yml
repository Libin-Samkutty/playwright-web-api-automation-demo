name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # schedule:
  #   - cron: '0 2 * * *' # Nightly at 2 AM UTC — disabled for demo project, uncomment to activate
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (@smoke, @critical, @regression, @extended)'
        required: false
        default: '@smoke'
      browser:
        description: 'Browser to run (chromium, firefox, webkit, all)'
        required: false
        default: 'chromium'

env:
  CI: true
  BASE_URL: https://practice.expandtesting.com
  PLAYWRIGHT_WORKERS: 4

jobs:
  smoke-gate:
    name: P0 Smoke Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=chromium

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 7

  critical-tests:
    name: P1 Critical — ${{ matrix.browser }}
    needs: smoke-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run critical tests
        run: npx playwright test --grep "@smoke|@critical" --project=${{ matrix.browser }}

      - name: Upload critical results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-results-${{ matrix.browser }}
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 7

  regression-tests:
    name: P2 Regression (Nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: smoke-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1/3, 2/3, 3/3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run regression tests
        run: >
          npx playwright test
          --grep "@smoke|@critical|@regression"
          --project=${{ matrix.browser }}
          --shard=${{ matrix.shard }}

      - name: Upload regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-${{ matrix.browser }}-${{ strategy.job-index }}
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 14

  extended-tests:
    name: P3 Extended (Weekly)
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 0'
    needs: regression-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run all tests
        run: npx playwright test --project=chromium

      - name: Upload extended results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extended-results
          path: |
            playwright-report/
            allure-results/
            test-results/
          retention-days: 30

  generate-report:
    name: Generate Allure Report
    needs: [critical-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge allure results
        run: |
          mkdir -p allure-results-merged
          find artifacts -name "*.json" -path "*/allure-results/*" -exec cp {} allure-results-merged/ \;

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: allure-results-merged
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history